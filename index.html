<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>EXIT CZ/SK Tierlist</title>
    <style>
        body { background-color: #121214; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        .title { color: #f1c40f; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; font-size: 2.5rem; font-weight: bold; }
        .list-container { width: 100%; max-width: 850px; display: flex; flex-direction: column; gap: 20px; }
        
        /* Karta hráče */
        .player-card { 
            background: #1e1e21; border-radius: 20px; padding: 25px; display: flex; align-items: center; gap: 25px; border: 1px solid #2d2d32; 
            cursor: pointer; transition: all 0.2s ease;
        }
        .player-card:hover { transform: scale(1.02); background: #252529; border-color: #444; }
        
        .rank-box { width: 55px; height: 55px; display: flex; justify-content: center; align-items: center; border-radius: 12px; font-weight: bold; font-size: 1.5rem; color: black; flex-shrink: 0; }
        .avatar { width: 80px; height: 80px; border-radius: 10px; image-rendering: pixelated; }
        .player-info { display: flex; flex-direction: column; }
        .player-name { font-weight: bold; font-size: 1.5rem; margin-bottom: 2px; }
        .player-score { color: #f1c40f; font-size: 1rem; margin-bottom: 15px; }
        
        .tiers-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .tier-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .tier-icon { width: 45px; height: 45px; background: #2a2a2e; border-radius: 50%; padding: 8px; border: 2px solid #555; display: flex; justify-content: center; align-items: center; }
        .tier-icon img { width: 30px; height: 30px; object-fit: contain; }
        .tier-badge { font-size: 11px; font-weight: bold; padding: 3px 10px; border-radius: 12px; min-width: 45px; text-align: center; }

        /* Barvy tierů */
        .lt1 { background-color: #f1c40f; color: black; }
        .ht3 { background-color: #e67e22; color: white; }
        .ht2 { background-color: #95a5a6; color: white; }
        .lt2 { background-color: #3498db; color: white; }

        /* Vyskakovací okno (Modal) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background-color: #1e1e21; padding: 40px; border-radius: 30px; width: 90%; max-width: 450px; text-align: center; position: relative; border: 1px solid #3d3d42; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .close-button { position: absolute; top: 20px; right: 25px; font-size: 35px; cursor: pointer; color: #888; }
        .close-button:hover { color: white; }
        .modal-avatar { width: 130px; height: 130px; border-radius: 50%; border: 5px solid #f1c40f; margin-bottom: 20px; image-rendering: pixelated; }
        #modalTiersDisplay { margin-top: 25px; display: flex; justify-content: center; gap: 15px; }
    </style>
</head>
<body>

    <h1 class="title">EXIT CZ/SK TIERLIST</h1>

    <div class="list-container">
        <div class="player-card" onclick="openModal('Anti1_', '306', 'https://minotar.net/helm/Anti1_/100.png', this)">
            <div class="rank-box" style="background: #f1c40f;">1</div>
            <img src="https://minotar.net/helm/Anti1_/100.png" class="avatar">
            <div class="player-info">
                <span class="player-name">Anti1_</span>
                <div class="player-score">306 points</div>
                <div class="tiers-row">
                    <div class="tier-item"><div class="tier-icon" style="border-color:#f1c40f"><img src="https://minecraft.wiki/images/Diamond_Axe_JE3_BE3.png"></div><span class="tier-badge lt1">LT1</span></div>
                    <div class="tier-item"><div class="tier-icon" style="border-color:#f1c40f"><img src="https://minecraft.wiki/images/Ender_Pearl_JE3_BE2.png"></div><span class="tier-badge lt1">LT1</span></div>
                    <div class="tier-item"><div class="tier-icon" style="border-color:#e67e22"><img src="https://minecraft.wiki/images/Diamond_Sword_JE3_BE3.png"></div><span class="tier-badge ht3">HT3</span></div>
                </div>
            </div>
        </div>

        <div class="player-card" onclick="openModal('NikyGameYT', '294', 'https://minotar.net/helm/NikyGameYT/100.png', this)">
            <div class="rank-box" style="background: #95a5a6;">2</div>
            <img src="https://minotar.net/helm/NikyGameYT/100.png" class="avatar">
            <div class="player-info">
                <span class="player-name">NikyGameYT</span>
                <div class="player-score">294 points</div>
                <div class="tiers-row">
                    <div class="tier-item"><div class="tier-icon" style="border-color:#95a5a6"><img src="https://minecraft.wiki/images/Netherite_Helmet_JE2_BE1.png"></div><span class="tier-badge ht2">HT2</span></div>
                    <div class="tier-item"><div class="tier-icon" style="border-color:#3498db"><img src="https://minecraft.wiki/images/Mace_JE1_BE1.png"></div><span class="tier-badge lt2">LT2</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <img id="modalAvatar" src="" class="modal-avatar">
            <h2 id="modalName" style="margin:10px 0; font-size: 2.5rem;"></h2>
            <div id="modalScore" style="color:#f1c40f; font-size:1.5rem; font-weight: bold;"></div>
            
            <div id="modalTiersDisplay"></div>
            
            <p style="color:#888; font-size: 0.9rem; margin-top: 30px;">Klikni kamkoliv mimo pro zavření</p>
        </div>
    </div>

    <script>
        function openModal(name, score, avatar, element) {
            // Vyplnění základních údajů
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalScore').innerText = score + (score.includes("points") ? "" : " points");
            document.getElementById('modalAvatar').src = avatar;
            
            // Kopírování tierů z karty do modalu
            const tierIcons = element.querySelector('.tiers-row').innerHTML;
            document.getElementById('modalTiersDisplay').innerHTML = tierIcons;
            
            // Zobrazení okna
            document.getElementById('playerModal').style.display = "flex";
        }

        function closeModal() {
            document.getElementById('playerModal').style.display = "none";
        }

        // Zavření při kliknutí na tmavé pozadí
        window.onclick = function(event) {
            let modal = document.getElementById('playerModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
