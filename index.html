<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>EXIT CZ/SK Tierlist</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1 class="title">EXIT CZ/SK TIERLIST</h1>

    <div class="list-container">
        <div class="player-card" onclick="openModal('Anti1_', '306 points', 'https://minotar.net/helm/Anti1_/100.png', this)">
            <div class="rank-box" style="background: #f1c40f;">1</div>
            <img src="https://minotar.net/helm/Anti1_/100.png" class="avatar">
            <div class="player-info">
                <span class="player-name">Anti1_</span>
                <div class="player-score">306 points</div>
                <div class="tiers-row">
                    <div class="tier-item"><div class="tier-icon" style="border-color:#f1c40f"><img src="https://minecraft.wiki/images/Diamond_Axe_JE3_BE3.png"></div><span class="tier-badge lt1">LT1</span></div>
                    <div class="tier-item"><div class="tier-icon" style="border-color:#f1c40f"><img src="https://minecraft.wiki/images/Ender_Pearl_JE3_BE2.png"></div><span class="tier-badge lt1">LT1</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <img id="modalAvatar" src="" class="modal-avatar">
            <h2 id="modalName"></h2>
            <div id="modalScore"></div>
            <div id="modalTiersDisplay"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
