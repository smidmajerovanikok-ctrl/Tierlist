<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>EXIT CZ/SK Tierlist</title>
    <style>
        body { background-color: #121214; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Horní tenká lišta */
        .top-bar {
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            box-sizing: border-box;
            border-bottom: 1px solid #2d2d32;
        }
        .player-count { color: #f1c40f; font-weight: bold; font-size: 14px; }
        .top-nav { display: flex; gap: 20px; }
        .nav-btn { background: none; border: none; color: #888; cursor: pointer; font-weight: bold; padding: 5px 10px; transition: 0.3s; }
        .nav-btn.active { color: #fff; border-bottom: 2px solid #fff; }
        .login-btn { background: transparent; border: 1px solid #f1c40f; color: #f1c40f; padding: 5px 15px; border-radius: 5px; cursor: pointer; }

        /* Hlavní hlavička s Discordem a vyhledáváním */
        .header-actions {
            width: 100%;
            max-width: 850px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
        }
        .discord-btn { background: #2c3e50; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; display: flex; align-items: center; gap: 10px; font-weight: bold; border: 1px solid #3d3d42; }
        .main-title { color: #fff; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 2rem; font-weight: bold; }
        .search-container { background: #1e1e21; border-radius: 20px; padding: 8px 15px; border: 1px solid #2d2d32; display: flex; align-items: center; }
        .search-container input { background: transparent; border: none; color: white; outline: none; margin-right: 10px; width: 150px; }
        .search-icon { color: #888; }

        /* Karta hráče */
        .list-container { width: 100%; max-width: 850px; display: flex; flex-direction: column; gap: 15px; padding: 20px; box-sizing: border-box; }
        .player-card { 
            background: #1e1e21; border-radius: 15px; padding: 20px; display: flex; align-items: center; gap: 25px; border: 1px solid #2d2d32; 
            cursor: pointer; transition: all 0.2s ease;
        }
        .player-card:hover { transform: scale(1.01); background: #252529; border-color: #f1c40f; }
        
        .rank-box { width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; border-radius: 10px; font-weight: bold; font-size: 1.3rem; color: black; flex-shrink: 0; }
        .avatar { width: 70px; height: 70px; border-radius: 10px; image-rendering: pixelated; }
        .player-info { display: flex; flex-direction: column; flex-grow: 1; }
        .player-name { font-weight: bold; font-size: 1.4rem; margin-bottom: 2px; }
        .player-score { color: #f1c40f; font-size: 0.9rem; margin-bottom: 10px; font-weight: bold; }
        
        .tiers-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .tier-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .tier-icon { width: 40px; height: 40px; background: #2a2a2e; border-radius: 50%; padding: 6px; border: 2px solid #444; display: flex; justify-content: center; align-items: center; }
        .tier-icon img { width: 25px; height: 25px; object-fit: contain; }
        .tier-badge { font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 10px; min-width: 40px; text-align: center; }

        /* Barvy tierů */
        .lt1 { background-color: #f1c40f; color: black; }
        .ht3 { background-color: #e67e22; color: white; }
        .ht2 { background-color: #95a5a6; color: white; }
        .lt2 { background-color: #3498db; color: white; }

        /* Vyskakovací okno */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background-color: #1e1e21; padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; position: relative; border: 1px solid #f1c40f; }
        .close-button { position: absolute; top: 20px; right: 25px; font-size: 35px; cursor: pointer; color: #888; }
        .modal-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #f1c40f; margin-bottom: 20px; image-rendering: pixelated; }
        #modalTiersDisplay { margin-top: 25px; display: flex; justify-content: center; gap: 15px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="player-count">👤 <span id="player-num">2</span> HRÁČŮ</div>
        <div class="top-nav">
            <button class="nav-btn active">CZSKTiers</button>
            <button class="nav-btn">CZSKSubtiers</button>
        </div>
        <button class="login-btn">Přihlásit se</button>
    </div>

    <div class="header-actions">
        <a href="https://discord.gg/VAS_ODKAZ" target="_blank" class="discord-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" width="20"> Discord
        </a>
        <h1 class="main-title">CZSKTiers</h1>
        <div class="search-container">
            <input type="text" id="playerSearch" placeholder="Najdi hráče...">
            <span class="search-icon">🔍</span>
        </div>
    </div>

    <div class="list-container" id="playerList">
        <div class="player-card" onclick="openModal('Anti1_', '306', 'https://minotar.net/helm/Anti1_/100.png', this)">
            <div class="rank-box" style="background: #f1c40f;">1</div>
            <img src="https://minotar.net/helm/Anti1_/100.png" class="avatar">
            <div class="player-info">
                <span class="player-name">Anti1_</span>
                <div class="player-score">306 points</div>
                <div class="tiers-row">
                    <div class="tier-item"><div class="tier-icon"><img src="https://minecraft.wiki/images/Diamond_Axe_JE3_BE3.png"></div><span class="tier-badge lt1">LT1</span></div>
                    <div class="tier-item"><div class="tier-icon"><img src="https://minecraft.wiki/images/Ender_Pearl_JE3_BE2.png"></div><span class="tier-badge lt1">LT1</span></div>
                    <div class="tier-item"><div class="tier-icon"><img src="https://minecraft.wiki/images/Diamond_Sword_JE3_BE3.png"></div><span class="tier-badge ht3">HT3</span></div>
                </div>
            </div>
        </div>

        <div class="player-card" onclick="openModal('NikyGameYT', '294', 'https://minotar.net/helm/NikyGameYT/100.png', this)">
            <div class="rank-box" style="background: #95a5a6;">2</div>
            <img src="https://minotar.net/helm/NikyGameYT/100.png" class="avatar">
            <div class="player-info">
                <span class="player-name">NikyGameYT</span>
                <div class="player-score">294 points</div>
                <div class="tiers-row">
                    <div class="tier-item"><div class="tier-icon"><img src="https://minecraft.wiki/images/Netherite_Helmet_JE2_BE1.png"></div><span class="tier-badge ht2">HT2</span></div>
                    <div class="tier-item"><div class="tier-icon"><img src="https://minecraft.wiki/images/Mace_JE1_BE1.png"></div><span class="tier-badge lt2">LT2</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <img id="modalAvatar" src="" class="modal-avatar">
            <h2 id="modalName" style="margin:0; font-size: 2.2rem;"></h2>
            <div id="modalScore" style="color:#f1c40f; font-size:1.3rem; margin-top:5px;"></div>
            <div id="modalTiersDisplay"></div>
            <p style="color:#555; font-size: 0.8rem; margin-top: 30px;">Zavřete kliknutím na křížek nebo vedle okna</p>
        </div>
    </div>

    <script>
        // Funkce pro počítání hráčů
        function updatePlayerCount() {
            const count = document.querySelectorAll('.player-card').length;
            document.getElementById('player-num').innerText = count;
        }

        // Vyhledávání hráčů
        document.getElementById('playerSearch').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.player-card');
            
            cards.forEach(card => {
                const name = card.querySelector('.player-name').innerText.toLowerCase();
                if (name.includes(term)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        // Modální okno
        function openModal(name, score, avatar, element) {
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalScore').innerText = score + " points";
            document.getElementById('modalAvatar').src = avatar;
            const tierIcons = element.querySelector('.tiers-row').innerHTML;
            document.getElementById('modalTiersDisplay').innerHTML = tierIcons;
            document.getElementById('playerModal').style.display = "flex";
        }

        function closeModal() {
            document.getElementById('playerModal').style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('playerModal')) closeModal();
        }

        // Spustit při načtení
        updatePlayerCount();
    </script>
</body>
</html>
