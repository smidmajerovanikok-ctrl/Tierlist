<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>EXIT CZ/SK Tierlist</title>
    <style>
        body {
            background-color: #121214;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        .title {
            color: #f1c40f;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .list-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .player-card {
            background: #1e1e21;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 25px;
            border: 1px solid #2d2d32;
        }

        .rank-box {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.4rem;
            color: black;
            flex-shrink: 0;
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            image-rendering: pixelated;
        }

        .player-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .player-name {
            font-weight: bold;
            font-size: 1.3rem;
            display: block;
        }

        .player-score {
            color: #f1c40f;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: block;
        }

        .tiers-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .tier-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .tier-icon {
            width: 32px;
            height: 32px;
            background: #2a2a2e;
            border-radius: 50%;
            padding: 6px;
            border: 2px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tier-icon img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .tier-badge {
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            text-align: center;
            min-width: 35px;
            color: white;
        }

        /* Barvy tierů a okrajů */
        .lt1 { background-color: #f1c40f; color: black; }
        .lt1-border { border-color: #f1c40f; }

        .ht3 { background-color: #e67e22; }
        .ht3-border { border-color: #e67e22; }

        .ht2 { background-color: #95a5a6; }
        .ht2-border { border-color: #95a5a6; }

        .lt2 { background-color: #3498db; }
        .lt2-border { border-color: #3498db; }
    </style>
</head>
<body>

    <h1 class="title">EXIT CZ/SK Tierlist</h1>

    <div class="list-container">
        
        <div class="player-card">
            <div class="rank-box" style="background: #FFD700;">1</div>
            <img src="https://minotar.net/helm/Anti1_/100.png" class="avatar">
            
            <div class="player-info">
                <span class="player-name">Anti1_</span>
                <span class="player-score">306</span>
                
                <div class="tiers-row">
                    <div class="tier-item">
                        <div class="tier-icon lt1-border">
                            <img src="https://minecraft.wiki/images/Diamond_Axe_JE3_BE3.png">
                        </div>
                        <span class="tier-badge lt1">LT1</span>
                    </div>

                    <div class="tier-item">
                        <div class="tier-icon lt1-border">
                            <img src="https://minecraft.wiki/images/Ender_Pearl_JE3_BE2.png">
                        </div>
                        <span class="tier-badge lt1">LT1</span>
                    </div>

                    <div class="tier-item">
                        <div class="tier-icon ht3-border">
                            <img src="https://minecraft.wiki/images/Diamond_Sword_JE3_BE3.png">
                        </div>
                        <span class="tier-badge ht3">HT3</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="player-card">
            <div class="rank-box" style="background: #C0C0C0;">2</div>
            <img src="https://minotar.net/helm/NikyGameYT/100.png" class="avatar">
            
            <div class="player-info">
                <span class="player-name">NikyGameYT</span>
                <span class="player-score">294</span>
                
                <div class="tiers-row">
                    <div class="tier-item">
                        <div class="tier-icon ht2-border">
                            <img src="https://minecraft.wiki/images/Netherite_Helmet_JE2_BE1.png">
                        </div>
                        <span class="tier-badge ht2">HT2</span>
                    </div>

                    <div class="tier-item">
                        <div class="tier-icon lt2-border">
                            <img src="https://minecraft.wiki/images/Mace_JE1_BE1.png">
                        </div>
                        <span class="tier-badge lt2">LT2</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
